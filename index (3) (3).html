<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aaditya ❤️ Saniya</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #e8c97e;
    --gold-light: #f5e0a8;
    --rose: #f4a0b5;
    --rose-dark: #c0607a;
    --plum: #6b2d5e;
    --deep: #0d0510;
    --mid: #1a0b22;
    --glow-rose: rgba(244,160,181,0.45);
    --glow-gold: rgba(232,201,126,0.35);
    --glow-plum: rgba(107,45,94,0.5);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--deep);
    font-family: 'Cormorant Garamond', Georgia, serif;
  }

  /* ── PARTICLE CANVAS ─────────────────────────────────── */
  #canvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    transition: opacity 2s ease;
  }
  #canvas.visible { opacity: 1; }

  /* ── AMBIENT BACKGROUND ──────────────────────────────── */
  #bg {
    position: fixed; inset: 0; z-index: 1;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(107,45,94,0.55) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 20% 100%, rgba(192,96,122,0.3) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 100%, rgba(232,201,126,0.2) 0%, transparent 60%),
      linear-gradient(160deg, #0d0510 0%, #1a0b22 50%, #0d0510 100%);
    opacity: 0;
    transition: opacity 1.8s ease;
  }
  #bg.visible { opacity: 1; }

  /* ── DOOR SCREEN ─────────────────────────────────────── */
  #door-screen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #070309 0%, #130820 40%, #1e0c2e 60%, #0a0312 100%);
    overflow: hidden;
  }

  /* Spotlight behind door */
  #door-screen::before {
    content: '';
    position: absolute;
    width: 500px; height: 700px;
    background: radial-gradient(ellipse, rgba(232,201,126,0.12) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: spotPulse 3s ease-in-out infinite;
  }
  @keyframes spotPulse {
    0%,100% { opacity: 0.7; transform: translate(-50%,-50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%,-50%) scale(1.08); }
  }

  /* Door frame */
  .door-frame {
    position: relative;
    width: min(260px, 55vw);
    height: min(420px, 75vh);
    z-index: 2;
    perspective: 1200px;
  }

  /* Ornate frame border */
  .door-frame::before {
    content: '';
    position: absolute;
    inset: -14px;
    border: 3px solid;
    border-color: var(--gold);
    box-shadow:
      0 0 18px var(--glow-gold),
      0 0 40px rgba(232,201,126,0.15),
      inset 0 0 18px var(--glow-gold);
    border-radius: 4px 4px 0 0;
    z-index: 0;
  }

  /* Corner ornaments */
  .door-frame::after {
    content: '✦';
    position: absolute;
    top: -28px; left: 50%; transform: translateX(-50%);
    font-size: 22px; color: var(--gold);
    text-shadow: 0 0 12px var(--glow-gold);
    z-index: 1;
  }

  .door-panel {
    position: absolute; inset: 0;
    background:
      linear-gradient(160deg, #2a1535 0%, #1a0d28 40%, #240f36 70%, #160a20 100%);
    border: 1px solid rgba(232,201,126,0.4);
    border-radius: 3px 3px 0 0;
    transform-origin: left center;
    transform-style: preserve-3d;
    overflow: hidden;
    cursor: pointer;
    z-index: 2;
    box-shadow:
      4px 0 30px rgba(0,0,0,0.8),
      inset 2px 0 12px rgba(232,201,126,0.06);
  }

  /* Door wood grain lines */
  .door-panel::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      180deg,
      transparent 0px,
      transparent 48px,
      rgba(232,201,126,0.04) 48px,
      rgba(232,201,126,0.04) 50px
    );
  }

  /* Door center motif */
  .door-motif {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 3;
  }
  .door-motif .heart-icon {
    font-size: clamp(36px, 8vw, 56px);
    filter: drop-shadow(0 0 14px var(--glow-rose)) drop-shadow(0 0 28px var(--glow-rose));
    animation: heartbeat 2.2s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%,100% { transform: scale(1); }
    15% { transform: scale(1.12); }
    30% { transform: scale(1); }
    45% { transform: scale(1.07); }
    60% { transform: scale(1); }
  }

  /* Upper & lower panels on door */
  .door-inset {
    position: absolute;
    left: 12%; width: 76%;
    border: 1px solid rgba(232,201,126,0.25);
    box-shadow: inset 0 0 10px rgba(232,201,126,0.07), 0 0 8px rgba(232,201,126,0.08);
    border-radius: 2px;
  }
  .door-inset.top { top: 10%; height: 26%; }
  .door-inset.bottom { bottom: 10%; height: 26%; }

  /* Door knob */
  .door-knob {
    position: absolute;
    right: 12%; top: 50%;
    transform: translateY(-50%);
    width: 14px; height: 14px;
    background: radial-gradient(circle at 35% 35%, var(--gold-light), var(--gold), #9a7a30);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--glow-gold), 0 2px 6px rgba(0,0,0,0.6);
    z-index: 4;
  }

  /* Door open animation */
  .door-panel.open {
    animation: doorSwing 2.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  @keyframes doorSwing {
    0%   { transform: rotateY(0deg); }
    100% { transform: rotateY(-110deg); }
  }

  /* Golden light burst when door opens */
  #light-burst {
    position: absolute;
    width: min(260px, 55vw);
    height: min(420px, 75vh);
    background: radial-gradient(ellipse, rgba(232,201,126,0.0) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 1;
    border-radius: 3px 3px 0 0;
  }
  #light-burst.burst {
    animation: lightBurst 2s ease-out forwards;
  }
  @keyframes lightBurst {
    0%   { background: radial-gradient(ellipse, rgba(232,201,126,0.0) 0%, transparent 70%); }
    30%  { background: radial-gradient(ellipse, rgba(255,240,200,0.85) 0%, rgba(232,201,126,0.4) 40%, transparent 70%); }
    100% { background: radial-gradient(ellipse, rgba(232,201,126,0.0) 0%, transparent 70%); }
  }

  /* Door screen fade out */
  #door-screen.fade-out {
    animation: screenFade 1.2s ease forwards;
  }
  @keyframes screenFade {
    0%   { opacity: 1; }
    100% { opacity: 0; pointer-events: none; }
  }

  /* ── MAIN CONTENT ────────────────────────────────────── */
  #main {
    position: fixed; inset: 0; z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 1.5s ease;
  }
  #main.visible { opacity: 1; }

  /* Couple container */
  .couple-wrap {
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    width: 100%;
    max-width: 900px;
    padding: 0 20px;
    gap: 0;
  }

  /* Individual figure */
  .figure {
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    position: relative;
  }
  .figure.boy  { transform: translateX(-120px); transition: opacity 1.2s ease, transform 1.4s cubic-bezier(0.25,0.46,0.45,0.94); }
  .figure.girl { transform: translateX(120px);  transition: opacity 1.2s ease, transform 1.4s cubic-bezier(0.25,0.46,0.45,0.94); }
  .figure.boy.arrived,
  .figure.girl.arrived {
    opacity: 1;
    transform: translateX(0);
  }

  .figure.boy .portrait-frame {
    animation: frameGlowGold 4s ease-in-out infinite;
  }
  .figure.girl .portrait-frame {
    animation: frameGlowRose 4s ease-in-out infinite;
  }
  @keyframes frameGlowGold {
    0%,100% {
      box-shadow:
        0 0 0 2px rgba(232,201,126,0.45),
        0 0 0 4px rgba(0,0,0,0.85),
        0 0 0 5px rgba(232,201,126,0.18),
        0 28px 55px 8px rgba(0,0,0,0.85),
        0 14px 30px 0px rgba(0,0,0,0.7),
        0 50px 40px -20px rgba(0,0,0,0.45);
    }
    50% {
      box-shadow:
        0 0 0 2px rgba(232,201,126,0.7),
        0 0 0 4px rgba(0,0,0,0.85),
        0 0 0 7px rgba(232,201,126,0.28),
        0 0 30px 4px rgba(232,201,126,0.2),
        0 28px 55px 8px rgba(0,0,0,0.9),
        0 14px 30px 0px rgba(0,0,0,0.7),
        0 50px 40px -20px rgba(0,0,0,0.5);
    }
  }
  @keyframes frameGlowRose {
    0%,100% {
      box-shadow:
        0 0 0 2px rgba(232,201,126,0.45),
        0 0 0 4px rgba(0,0,0,0.85),
        0 0 0 5px rgba(232,201,126,0.18),
        0 28px 55px 8px rgba(0,0,0,0.85),
        0 14px 30px 0px rgba(0,0,0,0.7),
        0 50px 40px -20px rgba(0,0,0,0.45);
    }
    50% {
      box-shadow:
        0 0 0 2px rgba(244,160,181,0.7),
        0 0 0 4px rgba(0,0,0,0.85),
        0 0 0 7px rgba(244,160,181,0.28),
        0 0 30px 4px rgba(244,160,181,0.2),
        0 28px 55px 8px rgba(0,0,0,0.9),
        0 14px 30px 0px rgba(0,0,0,0.7),
        0 50px 40px -20px rgba(0,0,0,0.5);
    }
  }

  /* ── PORTRAIT FRAME WRAPPER ──────────────────────────── */
  .portrait-frame {
    position: relative;
    display: inline-block;
    border-radius: 54% 54% 48% 48% / 42% 42% 58% 58%;
    padding: 7px;
    background: linear-gradient(160deg, #1a1a1a 0%, #000000 40%, #111111 70%, #0a0a0a 100%);
    box-shadow:
      0 0 0 2px rgba(232,201,126,0.45),
      0 0 0 4px rgba(0,0,0,0.85),
      0 0 0 5px rgba(232,201,126,0.18),
      0 28px 55px 8px rgba(0,0,0,0.85),
      0 14px 30px 0px rgba(0,0,0,0.7),
      0 50px 40px -20px rgba(0,0,0,0.45);
    transition: box-shadow 0.4s ease;
  }

  /* Inner rim shine */
  .portrait-frame::before {
    content: '';
    position: absolute;
    inset: 3px;
    border-radius: 54% 54% 48% 48% / 42% 42% 58% 58%;
    background: linear-gradient(160deg, rgba(232,201,126,0.18) 0%, transparent 40%, rgba(232,201,126,0.06) 100%);
    pointer-events: none;
    z-index: 2;
  }

  /* Ellipse shadow cast on the surface below */
  .portrait-frame::after {
    content: '';
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    height: 22px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.70) 0%, rgba(0,0,0,0.30) 45%, transparent 72%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    filter: blur(4px);
  }

  .figure img {
    width: clamp(130px, 28vw, 280px);
    height: auto;
    object-fit: contain;
    display: block;
    border-radius: 54% 54% 48% 48% / 42% 42% 58% 58%;
    position: relative;
    z-index: 1;
    transition: filter 0.4s ease;
  }

  .figure.girl img {
    filter: drop-shadow(0 0 14px var(--glow-rose)) drop-shadow(0 0 28px var(--glow-plum));
  }
  .figure.boy img {
    filter: drop-shadow(0 0 14px rgba(232,201,126,0.45)) drop-shadow(0 0 28px var(--glow-plum));
  }

  /* Glow ring behind each figure */
  .figure::before {
    content: '';
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: clamp(110px, 24vw, 240px);
    height: clamp(110px, 24vw, 240px);
    border-radius: 50%;
    pointer-events: none;
    z-index: -1;
  }
  .figure.boy::before {
    background: radial-gradient(circle, rgba(232,201,126,0.18) 0%, transparent 70%);
    box-shadow: 0 0 60px rgba(232,201,126,0.2);
  }
  .figure.girl::before {
    background: radial-gradient(circle, rgba(244,160,181,0.22) 0%, transparent 70%);
    box-shadow: 0 0 60px var(--glow-rose);
  }

  /* Center heart between the two */
  .center-heart {
    position: absolute;
    bottom: clamp(50px, 12vw, 110px);
    left: 50%; transform: translateX(-50%);
    font-size: clamp(22px, 5vw, 40px);
    opacity: 0;
    z-index: 5;
    animation: none;
    filter: drop-shadow(0 0 10px var(--glow-rose));
    transition: opacity 1s ease;
  }
  .center-heart.visible {
    opacity: 1;
    animation: floatHeart 3s ease-in-out infinite;
  }
  @keyframes floatHeart {
    0%,100% { transform: translateX(-50%) translateY(0) scale(1); }
    50%      { transform: translateX(-50%) translateY(-10px) scale(1.1); }
  }

  /* ── NAMES TITLE ─────────────────────────────────────── */
  .names-wrap {
    margin-top: clamp(14px, 4vw, 32px);
    text-align: center;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 1.2s ease 0.4s, transform 1.2s ease 0.4s;
  }
  .names-wrap.visible {
    opacity: 1; transform: translateY(0);
  }

  .names-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(22px, 5.5vw, 58px);
    font-weight: 400;
    letter-spacing: 0.06em;
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 30%, var(--rose) 55%, var(--gold) 80%, var(--gold-light) 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s linear infinite;
    text-shadow: none;
    line-height: 1.1;
  }
  @keyframes shimmer {
    0%   { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  .names-sub {
    margin-top: 6px;
    font-size: clamp(11px, 2.5vw, 16px);
    letter-spacing: 0.25em;
    color: rgba(232,201,126,0.55);
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    text-transform: uppercase;
  }

  /* Decorative line under names */
  .names-line {
    margin: 10px auto 0;
    width: clamp(80px, 30vw, 200px);
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--rose), var(--gold), transparent);
    opacity: 0.6;
  }

  /* ── FLOATING PARTICLES (canvas-based hearts) ─────── */
  /* handled in JS */

  /* ── MUSIC BUTTON ────────────────────────────────────── */
  #music-btn {
    position: fixed;
    bottom: 24px; right: 24px;
    z-index: 50;
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 1px solid rgba(232,201,126,0.45);
    background: rgba(26,11,34,0.7);
    backdrop-filter: blur(8px);
    color: var(--gold);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 14px rgba(232,201,126,0.2);
    transition: transform 0.2s, box-shadow 0.2s;
    opacity: 0;
    transition: opacity 1s ease, transform 0.2s, box-shadow 0.2s;
  }
  #music-btn.visible { opacity: 1; }
  #music-btn:hover { transform: scale(1.1); box-shadow: 0 0 22px rgba(232,201,126,0.4); }

  /* ── RESPONSIVE TWEAKS ───────────────────────────────── */
  @media (max-width: 480px) {
    .couple-wrap { gap: 0; }
    .figure img  { width: clamp(100px, 38vw, 170px); }
    .figure.boy  { transform: translateX(-80px); }
    .figure.girl { transform: translateX(80px); }
  }
</style>
</head>
<body>

<!-- Floating hearts canvas -->
<canvas id="canvas"></canvas>

<!-- Ambient background -->
<div id="bg"></div>

<!-- ══ DOOR SCREEN ══════════════════════════════════════ -->
<div id="door-screen">
  <div id="light-burst"></div>
  <div class="door-frame">
    <div class="door-panel" id="door">
      <div class="door-inset top"></div>
      <div class="door-motif"><span class="heart-icon">♥</span></div>
      <div class="door-inset bottom"></div>
      <div class="door-knob"></div>
    </div>
  </div>
</div>

<!-- ══ MAIN CONTENT ══════════════════════════════════════ -->
<div id="main">
  <div class="couple-wrap">
    <!-- Center floating heart -->
    <div class="center-heart" id="centerHeart">♥</div>

    <!-- Boy -->
    <div class="figure boy" id="figBoy">
      <div class="portrait-frame">
        <img src="boy.png" alt="Aaditya" draggable="false" />
      </div>
    </div>

    <!-- Girl -->
    <div class="figure girl" id="figGirl">
      <div class="portrait-frame">
        <img src="girl.png" alt="Saniya" draggable="false" />
      </div>
    </div>
  </div>

  <!-- Names -->
  <div class="names-wrap" id="namesWrap">
    <div class="names-title">Aaditya &nbsp;❤️&nbsp; Saniya</div>
    <div class="names-line"></div>
  </div>
</div>

<!-- Music toggle -->
<button id="music-btn" title="Toggle Music" aria-label="Toggle Music">♫</button>

<!-- Audio -->
<audio id="bgMusic" src="love.mp3" loop preload="auto"></audio>

<script>
(function () {
  'use strict';

  /* ── ELEMENTS ──────────────────────────────────────── */
  const doorScreen = document.getElementById('door-screen');
  const door       = document.getElementById('door');
  const lightBurst = document.getElementById('light-burst');
  const bgEl       = document.getElementById('bg');
  const canvas     = document.getElementById('canvas');
  const main       = document.getElementById('main');
  const figBoy     = document.getElementById('figBoy');
  const figGirl    = document.getElementById('figGirl');
  const namesWrap  = document.getElementById('namesWrap');
  const centerHrt  = document.getElementById('centerHeart');
  const musicBtn   = document.getElementById('music-btn');
  const audio      = document.getElementById('bgMusic');

  /* ── PARTICLE SYSTEM ───────────────────────────────── */
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize () {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const HEARTS = ['♥', '❤', '♡'];
  const COLORS = [
    'rgba(244,160,181,VAL)',
    'rgba(232,201,126,VAL)',
    'rgba(200,120,160,VAL)',
    'rgba(255,190,210,VAL)',
    'rgba(180,100,140,VAL)',
  ];

  function spawnParticle () {
    return {
      x: Math.random() * W,
      y: H + 20,
      size: 10 + Math.random() * 18,
      speed: 0.5 + Math.random() * 1.2,
      drift: (Math.random() - 0.5) * 0.6,
      opacity: 0.15 + Math.random() * 0.55,
      fade: 0.003 + Math.random() * 0.004,
      char: HEARTS[Math.floor(Math.random() * HEARTS.length)],
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      rotation: (Math.random() - 0.5) * 0.4,
      rotSpeed: (Math.random() - 0.5) * 0.015,
      angle: 0,
    };
  }

  function animateParticles () {
    ctx.clearRect(0, 0, W, H);
    // Spawn
    if (particles.length < 55 && Math.random() < 0.25) {
      particles.push(spawnParticle());
    }
    // Draw & update
    particles = particles.filter(p => p.opacity > 0 && p.y > -30);
    particles.forEach(p => {
      p.y -= p.speed;
      p.x += p.drift;
      p.opacity -= p.fade;
      p.angle += p.rotSpeed;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.globalAlpha = Math.max(0, p.opacity);
      ctx.font = `${p.size}px serif`;
      ctx.fillStyle = p.color.replace('VAL', p.opacity.toFixed(2));
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.char, 0, 0);
      ctx.restore();
    });
    requestAnimationFrame(animateParticles);
  }

  /* ── SEQUENCE ──────────────────────────────────────── */
  function startSequence () {
    // Step 1: Open door after 1.2s delay
    setTimeout(() => {
      door.classList.add('open');
      lightBurst.classList.add('burst');

      // Step 2: After door swing (2.2s) → fade screen, reveal bg
      setTimeout(() => {
        doorScreen.classList.add('fade-out');
        bgEl.classList.add('visible');
        canvas.classList.add('visible');
        animateParticles();

        // Step 3: Show main content
        setTimeout(() => {
          main.classList.add('visible');
          doorScreen.style.display = 'none';

          // Step 4: Figures slide in
          setTimeout(() => {
            figBoy.classList.add('arrived');
            figGirl.classList.add('arrived');

            // Step 5: Names + heart appear
            setTimeout(() => {
              namesWrap.classList.add('visible');
              centerHrt.classList.add('visible');
              musicBtn.classList.add('visible');

              // Start music
              playMusic();
            }, 800);
          }, 400);
        }, 500);
      }, 2200);
    }, 1200);
  }

  /* ── MUSIC ─────────────────────────────────────────── */
  let muted = false;

  function playMusic () {
    audio.volume = 0;
    audio.play().then(() => {
      fadeAudioIn();
    }).catch(() => {
      // Autoplay blocked — user can tap button
    });
  }

  function fadeAudioIn () {
    let v = 0;
    const interval = setInterval(() => {
      v = Math.min(v + 0.02, 0.75);
      audio.volume = v;
      if (v >= 0.75) clearInterval(interval);
    }, 80);
  }

  musicBtn.addEventListener('click', () => {
    if (audio.paused) {
      audio.play();
      muted = false;
      musicBtn.textContent = '♫';
    } else {
      audio.pause();
      muted = true;
      musicBtn.textContent = '♪';
    }
  });

  /* ── BOOT ──────────────────────────────────────────── */
  window.addEventListener('DOMContentLoaded', startSequence);
  // Also trigger on click/touch for stubborn autoplay policies
  document.addEventListener('click', function tryPlay () {
    if (audio.paused && !muted) {
      audio.play().catch(() => {});
    }
    document.removeEventListener('click', tryPlay);
  }, { once: true });

})();
</script>
</body>
</html>
